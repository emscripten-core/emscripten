<!doctype html>
<!--
  Cross-Origin Storage (COS) example for Emscripten.

  Build main.cpp first (see README.md), then serve this directory over HTTP
  and open this page in a browser with the COS API available.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Emscripten — Cross-Origin Storage example</title>
    <style>
      body {
        font-family: monospace;
        max-width: 640px;
        margin: 2rem auto;
        padding: 0 1rem;
      }
      h1 { font-size: 1.2rem; }
      #status {
        border: 1px solid #ccc;
        border-radius: 4px;
        padding: 0.75rem 1rem;
        margin-top: 1rem;
        white-space: pre-wrap;
        min-height: 8rem;
      }
      .ok   { color: green; }
      .warn { color: orange; }
      .err  { color: red; }
    </style>
  </head>
  <body>
    <h1>Emscripten — Cross-Origin Storage example</h1>
    <p>Reload the page after the first load to observe the cache-hit path.</p>
    <div id="status">Loading…</div>

    <script>
      const log = (msg, cls = '') => {
        const el = document.getElementById('status');
        const line = document.createElement('div');
        if (cls) line.className = cls;
        line.textContent = msg;
        el.appendChild(line);
        console.log(msg);
      };

      if ('crossOriginStorage' in navigator) {
        log('✓ Cross-Origin Storage API is active', 'ok');
      } else {
        log('✗ Cross-Origin Storage API is not available — Wasm will be loaded via the network', 'warn');
      }

      // Module callbacks invoked by the Emscripten COS runtime paths.
      var Module = {
        print:    (text) => log('[wasm] ' + text, 'ok'),
        printErr: (text) => log('[wasm err] ' + text, 'err'),

        // Called when the Wasm binary was found in the cross-origin cache.
        onCOSCacheHit: (hash) => {
          log('✓ Wasm loaded from Cross-Origin Storage (SHA-256: ' + hash + ')', 'ok');
        },

        // Called when the Wasm binary was not in COS and was fetched over the network.
        onCOSCacheMiss: (hash, url) => {
          log('↓ Wasm not in Cross-Origin Storage — fetched from network: ' + url + ' (SHA-256: ' + hash + ')', 'warn');
        },

        // Called after the Wasm binary has been successfully written to COS.
        onCOSStore: (hash) => {
          log('✓ Wasm stored in Cross-Origin Storage (SHA-256: ' + hash + ')', 'ok');
        },

        onRuntimeInitialized: () => {
          log('✓ Runtime initialised', 'ok');
          const greeting = Module.ccall('greet', 'string', [], []);
          log('greet() → ' + greeting, 'ok');
        },
      };
    </script>

    <!--
      index.js is the Emscripten-generated glue. When built with
      -sCROSS_ORIGIN_STORAGE=1 it contains the COS fetch logic and the
      SHA-256 hash of index.wasm embedded as a build-time constant.
    -->
    <script src="index.js"></script>
  </body>
</html>
