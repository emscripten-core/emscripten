<!doctype html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Emscripten-Generated Code</title>
  </head>
  <body style='background-color:#606060; margin:0px;'>
    <!-- Use a red background color for canvas that should never be visible -->
    <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()" style='background-color:#FF0000;'> </canvas>
    <br>
    <textarea class="emscripten" id="output" rows="8" style='width:80%'></textarea>
    <script type='text/javascript'>
      var Module = {
        print: (() => {
          var element = document.getElementById('output');
          if (element) element.value = ''; // clear browser cache
          return (...args) => {
            var text = args.join(' ');
            console.log(text);
            if (element) {
              element.value += text + "\n";
              element.scrollTop = element.scrollHeight; // focus on bottom
            }
          };
        })(),
        printErr(..args) {
          var text = args.join(' ');
          console.error(text);
        },
      };
    </script>
    {{{ SCRIPT }}}
  </body>
</html>
