        uses: ./.github/actions/prepare-for-tests

      - name: Install Firefox
        uses: ./.github/actions/install-firefox

      - name: Run browser tests (firefox)
        run: |
          export EMTEST_BROWSER="$HOME/firefox/firefox"
          export EM_FROZEN_CACHE=""
          ./test/runner browser skip:browser.test_sdl2_mouse skip:browser.test_html5_webgl_create_context skip:browser.test_glut_glutget
